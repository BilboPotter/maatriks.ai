<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 117" role="img" aria-label="maatriks — logo mark and wordmark lockup">
  <defs>
    <!-- ═══ LOGO MARK GRADIENTS (userSpaceOnUse, scaled to logo group) ═══ -->
    <linearGradient id="lBarBot" x1="14" y1="64" x2="70" y2="79" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="15%" stop-color="#ff8a1f"/>
      <stop offset="35%" stop-color="#e06800"/>
      <stop offset="100%" stop-color="#b85a00"/>
    </linearGradient>
    <linearGradient id="lBarMid" x1="22" y1="43" x2="78" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="15%" stop-color="#ff8a1f"/>
      <stop offset="35%" stop-color="#e06800"/>
      <stop offset="100%" stop-color="#b85a00"/>
    </linearGradient>
    <linearGradient id="lBarTop" x1="30" y1="22" x2="86" y2="37" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="15%" stop-color="#ff8a1f"/>
      <stop offset="35%" stop-color="#e06800"/>
      <stop offset="100%" stop-color="#b85a00"/>
    </linearGradient>

    <!-- Logo bar sheens -->
    <linearGradient id="lSheenBot" x1="0" y1="64" x2="0" y2="79" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="lSheenMid" x1="0" y1="43" x2="0" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="lSheenTop" x1="0" y1="22" x2="0" y2="37" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>

    <!-- ═══ WORDMARK GRADIENTS ═══ -->
    <linearGradient id="wGrad" x1="0" y1="0" x2="0.4" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="15%" stop-color="#ff8a1f"/>
      <stop offset="35%" stop-color="#e06800"/>
      <stop offset="100%" stop-color="#b85a00"/>
    </linearGradient>
    <linearGradient id="wSheen" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="wHairline" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffe8c0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffe8c0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffe8c0" stop-opacity="0"/>
    </linearGradient>

    <!-- ═══ SHARED FILTERS ═══ -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="ambientShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <filter id="wDropShadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

  </defs>

  <!-- ═══════════════════════════════════════════
       LOGO MARK — The Shift (scaled 1.4x, centered on wordmark x-height)
       Bars occupy y=22-79 in source. x-height of wordmark: y=42-89.
       Logo extends ~11px above and below x-height for visual weight.
       ═══════════════════════════════════════════ -->
  <g transform="translate(3, -11) scale(1.4)">
    <!-- Ambient shadow -->
    <g filter="url(#ambientShadow)" opacity="0.4">
      <polygon points="14,79 64,79 70,64 20,64" fill="#000"/>
      <polygon points="22,58 72,58 78,43 28,43" fill="#000"/>
      <polygon points="30,37 80,37 86,22 36,22" fill="#000"/>
    </g>
    <!-- Bottom bar -->
    <g>
      <polygon points="14,79 64,79 70,64 20,64" fill="url(#lBarBot)"/>
      <polygon points="14,79 64,79 70,64 20,64" fill="url(#lSheenBot)"/>
      <line x1="20" y1="64" x2="70" y2="64" stroke="#ffe8c0" stroke-width="0.26" opacity="0.45"/>
    </g>
    <!-- Middle bar -->
    <g filter="url(#dropShadow)">
      <polygon points="22,58 72,58 78,43 28,43" fill="url(#lBarMid)"/>
      <polygon points="22,58 72,58 78,43 28,43" fill="url(#lSheenMid)"/>
      <line x1="28" y1="43" x2="78" y2="43" stroke="#ffe8c0" stroke-width="0.26" opacity="0.45"/>
    </g>
    <!-- Top bar -->
    <g filter="url(#dropShadow)">
      <polygon points="30,37 80,37 86,22 36,22" fill="url(#lBarTop)"/>
      <polygon points="30,37 80,37 86,22 36,22" fill="url(#lSheenTop)"/>
      <line x1="36" y1="22" x2="86" y2="22" stroke="#ffe8c0" stroke-width="0.26" opacity="0.45"/>
    </g>
  </g>

