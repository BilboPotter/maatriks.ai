<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="maatriks.ai favicon">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="nodeGlow">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="60%" stop-color="#ff8a1f"/>
      <stop offset="100%" stop-color="#e06800"/>
    </radialGradient>
    <radialGradient id="nodeAccent">
      <stop offset="0%" stop-color="#ffd080"/>
      <stop offset="50%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff8a1f"/>
    </radialGradient>
    <radialGradient id="dimNode">
      <stop offset="0%" stop-color="#252535"/>
      <stop offset="100%" stop-color="#15151f"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bloom" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <filter id="mGlowDeep" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5.5"/>
    </filter>
    <filter id="mGlowMid" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.2"/>
    </filter>
    <filter id="mGlowSharp" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8"/>
    </filter>
    <linearGradient id="lineGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a1f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a1f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="lineVert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a1f" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ff8a1f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff8a1f" stop-opacity="0.6"/>
    </linearGradient>
