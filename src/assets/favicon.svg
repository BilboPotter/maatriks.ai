<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="maatriks logo mark — clean modern 3D on dark">
  <defs>
    <!-- Background radial gradient — subtle brightening behind mark -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#08080C"/>
    </radialGradient>

    <!-- Bar gradients — bright highlight on leading edge, darkens quickly -->
    <!-- Bottom bar gradient -->
    <linearGradient id="barBottom" x1="14" y1="64" x2="70" y2="79" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="15%" stop-color="#ff8a1f"/>
      <stop offset="35%" stop-color="#e06800"/>
      <stop offset="100%" stop-color="#b85a00"/>
    </linearGradient>
    <!-- Middle bar gradient -->
    <linearGradient id="barMiddle" x1="22" y1="43" x2="78" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="15%" stop-color="#ff8a1f"/>
      <stop offset="35%" stop-color="#e06800"/>
      <stop offset="100%" stop-color="#b85a00"/>
    </linearGradient>
    <!-- Top bar gradient -->
    <linearGradient id="barTop" x1="30" y1="22" x2="86" y2="37" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="15%" stop-color="#ff8a1f"/>
      <stop offset="35%" stop-color="#e06800"/>
      <stop offset="100%" stop-color="#b85a00"/>
    </linearGradient>

    <!-- Sheen gradients — faint lighter band across upper portion of each bar -->
    <!-- Bottom bar sheen -->
    <linearGradient id="sheenBottom" x1="0" y1="64" x2="0" y2="79" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
    <!-- Middle bar sheen -->
    <linearGradient id="sheenMiddle" x1="0" y1="43" x2="0" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
    <!-- Top bar sheen -->
    <linearGradient id="sheenTop" x1="0" y1="22" x2="0" y2="37" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Drop shadow filter — crisp, defined, moderate blur -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <!-- Ambient ground shadow — soft, spread beneath the entire mark -->
    <filter id="ambientShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Transparent background — composites onto any surface -->

  <!-- Ambient ground shadow beneath entire mark -->
  <g filter="url(#ambientShadow)" opacity="0.4">
    <polygon points="14,79 64,79 70,64 20,64" fill="#000000"/>
    <polygon points="22,58 72,58 78,43 28,43" fill="#000000"/>
    <polygon points="30,37 80,37 86,22 36,22" fill="#000000"/>
  </g>

  <!-- Bottom bar — DATA (rendered first, sits behind) -->
  <g>
    <!-- Base fill with gradient -->
    <polygon points="14,79 64,79 70,64 20,64" fill="url(#barBottom)"/>
    <!-- Surface sheen overlay -->
    <polygon points="14,79 64,79 70,64 20,64" fill="url(#sheenBottom)"/>
    <!-- Thin separator / highlight line along top edge -->
    <line x1="20" y1="64" x2="70" y2="64" stroke="#ffe8c0" stroke-width="0.3" opacity="0.45"/>
  </g>

  <!-- Middle bar — ALGORITHM (with drop shadow onto bottom bar) -->
  <g filter="url(#dropShadow)">
    <!-- Base fill with gradient -->
    <polygon points="22,58 72,58 78,43 28,43" fill="url(#barMiddle)"/>
    <!-- Surface sheen overlay -->
    <polygon points="22,58 72,58 78,43 28,43" fill="url(#sheenMiddle)"/>
    <!-- Thin separator / highlight line along top edge -->
    <line x1="28" y1="43" x2="78" y2="43" stroke="#ffe8c0" stroke-width="0.3" opacity="0.45"/>
  </g>

  <!-- Top bar — ADAPTATION (with drop shadow onto middle bar) -->
  <g filter="url(#dropShadow)">
    <!-- Base fill with gradient -->
    <polygon points="30,37 80,37 86,22 36,22" fill="url(#barTop)"/>
    <!-- Surface sheen overlay -->
    <polygon points="30,37 80,37 86,22 36,22" fill="url(#sheenTop)"/>
    <!-- Thin separator / highlight line along top edge -->
    <line x1="36" y1="22" x2="86" y2="22" stroke="#ffe8c0" stroke-width="0.3" opacity="0.45"/>
  </g>
</svg>