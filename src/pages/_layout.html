<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}}</title>
  <meta name="description" content="{{pageDescription}}">
  <meta name="referrer" content="{{referrerPolicy}}">
  {{robotsMeta}}
  <link rel="canonical" href="{{canonicalUrl}}">
  {{securityMeta}}
  <meta property="og:title" content="{{socialTitle}}">
  <meta property="og:site_name" content="{{siteName}}">
  <meta property="og:description" content="{{socialDescription}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{canonicalUrl}}">
  <meta property="og:image" content="{{socialImageUrl}}">
  <meta property="og:image:alt" content="{{socialImageAlt}}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{socialTitle}}">
  <meta name="twitter:description" content="{{socialDescription}}">
  <meta name="twitter:image" content="{{socialImageUrl}}">
  <meta name="twitter:image:alt" content="{{socialImageAlt}}">
  <meta name="theme-color" content="#050505">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <link rel="alternate" type="application/rss+xml" title="{{appName}} Blog" href="/blog/feed.xml">
  <link rel="preload" href="/assets/fonts/dm-sans-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/assets/fonts/jetbrains-mono-latin.woff2" as="font" type="font/woff2" crossorigin>
  {{structuredDataHtml}}
  <style>{{criticalCss}}</style>
  <link rel="preload" href="/styles/main.css" as="style">
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
{{content}}
{{mainScript}}
{{consentBanner}}
{{consentScript}}
</body>
</html>
