<div class="page">
  <div class="auth-page">
    <div class="lines-bg"></div>
    <div class="auth-card" id="auth-card">
      <div class="auth-spinner" id="spinner"></div>
      <h1>Signing you in</h1>
      <p>Redirecting you back to {{appName}}...</p>
      <div class="auth-status" id="status">Opening app</div>

      <div class="auth-fallback" id="fallback">
        <h3>App didn't open?</h3>
        <ol>
          <li>Make sure <strong>{{appName}}</strong> is installed on your device</li>
          <li>Try opening the app manually — your sign-in may have completed</li>
          <li>If the problem persists, <a href="{{supportUrl}}">contact support</a></li>
        </ol>
        <div style="margin-top:24px;">
          <a href="{{iosAppStoreUrl}}" class="btn btn-outline" style="margin-right:8px;">App Store</a>
          <a href="{{googlePlayUrl}}" class="btn btn-outline">Google Play</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/scripts/auth-callback.js"></script>
</div>
