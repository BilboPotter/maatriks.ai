<div class="device-status device-status--system">
  <span class="device-time">14:00</span>
  <div class="device-icons device-icons--system" aria-hidden="true">
    <span class="status-icon status-icon--signal">
      <svg viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="7" width="2" height="4" rx="1" fill="currentColor" />
        <rect x="5" y="5" width="2" height="6" rx="1" fill="currentColor" />
        <rect x="9" y="3" width="2" height="8" rx="1" fill="currentColor" />
        <rect x="13" y="1" width="2" height="10" rx="1" fill="currentColor" />
      </svg>
    </span>
    <span class="status-icon status-icon--wifi">
      <svg viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 4.5C5.3 1.8 10.7 1.8 14 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        <path d="M4.5 7C6.55 5.35 9.45 5.35 11.5 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        <circle cx="8" cy="9.4" r="1.1" fill="currentColor" />
      </svg>
    </span>
    <span class="status-icon status-icon--battery">
      <svg viewBox="0 0 24 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="19" height="10" rx="2.2" stroke="currentColor" stroke-width="1.4" />
        <rect x="3.2" y="3.2" width="4.2" height="5.6" rx="1.2" fill="#E04E43" />
        <rect x="21" y="4" width="2" height="4" rx="1" fill="currentColor" />
      </svg>
    </span>
  </div>
</div>
<div class="device-island"></div>

<div class="screen screen--workout screen--workout-screenshot">
  <div class="screen-scroll screen-scroll--preview screen-scroll--footer-button-tabbar">
    <div class="app-preview-topline ui-mono-small text-secondary">Tuesday · Week 04</div>

    <div class="app-preview-hero">
      <div class="ui-label app-preview-kicker">Today</div>
      <div class="ui-heading app-preview-title">Full Body C</div>
      <div class="ui-mono-small text-secondary">5 exercises</div>
    </div>

    <div class="app-week-strip">
      <div class="app-week-header">
        <div class="ui-label">This week</div>
        <div class="ui-mono-small text-secondary">0 / 4</div>
      </div>

      <div class="app-week-track">
        <div class="app-week-day">
          <span class="app-week-dot"></span>
          <span class="ui-label">Mon</span>
        </div>
        <div class="app-week-day">
          <span class="app-week-dot"></span>
          <span class="ui-label">Tue</span>
        </div>
        <div class="app-week-day">
          <span class="app-week-dot"></span>
          <span class="ui-label">Wed</span>
        </div>
        <div class="app-week-day">
          <span class="app-week-dot"></span>
          <span class="ui-label">Thu</span>
        </div>
        <div class="app-week-day">
          <span class="app-week-dot"></span>
          <span class="ui-label">Fri</span>
        </div>
        <div class="app-week-day">
          <span class="app-week-dot"></span>
          <span class="ui-label">Sat</span>
        </div>
        <div class="app-week-day">
          <span class="app-week-dot"></span>
          <span class="ui-label">Sun</span>
        </div>
      </div>
    </div>

    <div class="app-review-row">
      <span>Coach review</span>
      <span class="app-arrow">&rarr;</span>
    </div>
  </div>

  <div class="app-screen-footer app-screen-footer--button-tabbar">
    <div class="app-primary-button">
      <span class="app-primary-button-title">Start session</span>
      <span class="app-primary-button-meta">
        <span>Now</span>
        <span class="app-arrow">&rarr;</span>
      </span>
    </div>

    <div class="app-tabbar">
      <div class="app-tabbar-item">
        <svg class="app-tabbar-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5.5 10.5L12 5L18.5 10.5V18.5H14V14H10V18.5H5.5V10.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
        </svg>
        <span>Home</span>
      </div>
      <div class="app-tabbar-item is-active">
        <svg class="app-tabbar-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4.5 12H19.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
          <path d="M7 8V16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
          <path d="M17 8V16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
        </svg>
        <span>Workout</span>
      </div>
      <div class="app-tabbar-item">
        <svg class="app-tabbar-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="8.5" r="3" stroke="currentColor" stroke-width="1.5" />
          <path d="M6.5 18.5C7.6 15.95 9.5 14.75 12 14.75C14.5 14.75 16.4 15.95 17.5 18.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        <span>Profile</span>
      </div>
    </div>
  </div>
</div>
